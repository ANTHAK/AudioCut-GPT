<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能音频剪辑工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <header>
            <h1>🎵 智能音频剪辑工具</h1>
            <p class="subtitle">上传音频 · 自动识别文字 · 精准剪辑</p>
        </header>

        <!-- 上传区域 -->
        <section class="upload-section">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📁</div>
                <h3>拖拽音频文件到这里</h3>
                <p>或者点击选择文件</p>
                <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.m4a,.flac" hidden>
                <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                    选择文件
                </button>
                <p class="file-hint">支持格式: MP3, WAV, OGG, M4A, FLAC (最大100MB)</p>
            </div>
        </section>

        <!-- 加载状态 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p class="loading-text">正在处理音频，请稍候...</p>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>
                <p class="progress-text">0%</p>
            </div>
        </div>

        <!-- 识别结果区域 -->
        <section class="result-section" id="resultSection" style="display: none;">
            <div class="result-header">
                <h2>识别结果</h2>
                <button class="btn btn-secondary" onclick="resetApp()">重新上传</button>
            </div>

            <div class="full-text-box">
                <h3>完整文本</h3>
                <p id="fullText"></p>
            </div>

            <div class="segments-box">
                <h3>选择要剪辑的片段</h3>
                <p class="hint">点击下方的文字片段进行选择，支持多选</p>
                <div id="segmentsList"></div>
            </div>

            <div class="action-bar">
                <button class="btn btn-success" id="clipBtn" onclick="clipAudio()" disabled>
                    生成剪辑
                </button>
                <div class="selection-info">
                    已选择 <span id="selectedCount">0</span> 个片段
                </div>
            </div>
        </section>

        <!-- 剪辑记录列表区 -->
        <section id="clipHistorySection" class="result-section"
            style="display: none; margin-top: 2rem; border-top: 2px solid #eee; padding-top: 1.5rem;">
            <div class="result-header" style="background: #f8f9fa; padding: 10px; border-radius: 8px;">
                <h2 style="margin: 0; font-size: 1.25rem;">🎬 剪辑记录列表</h2>
            </div>
            <div id="clipHistoryList" style="margin-top: 1rem;">
                <!-- 记录将在这里追加 -->
            </div>
        </section>

        <!-- 兼容性保留 -->
        <section id="outputSection" style="display: none;"></section>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
